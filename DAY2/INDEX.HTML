<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background-color:#FAF3E0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:700px;
    background:#FFFFFF;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    color:#8B5E3C;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    border:1px solid #D8C3A5;
    border-radius:8px;
    background:#FFFDF8;
    font-size:15px;
}

.row{
    display:flex;
    gap:15px;
}

.col{
    flex:1;
}

.gender{
    margin-top:10px;
}

.gender input{
    width:auto;
}

button{
    width:100%;
    padding:12px;
    margin-top:25px;
    background:#D4A373;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#BC8A5F;
}

</style>
</head>

<body>

<div class="container">

<h2>Registration Form</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter full name">

<label>Email Address</label>
<input type="email" placeholder="Enter email address">

<div class="row">

<div class="col">
<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number">
</div>

<div class="col">
<label>Birth Date</label>
<input type="date">
</div>

</div>

<label>Gender</label>

<div class="gender">
<input type="radio" name="gender"> Male
&nbsp;&nbsp;&nbsp;
<input type="radio" name="gender"> Female
&nbsp;&nbsp;&nbsp;
<input type="radio" name="gender"> Prefer not to say
</div>

<label>Street Address</label>
<input type="text" placeholder="Enter street address">

<label>Street Address Line 2</label>
<input type="text" placeholder="Enter address line 2">

<div class="row">

<div class="col">
<label>Country</label>
<select>
<option>Select Country</option>
<option>India</option>
<option>USA</option>
<option>Canada</option>
<option>Australia</option>
</select>
</div>

<div class="col">
<label>City</label>
<input type="text" placeholder="Enter your city">
</div>

</div>

<div class="row">

<div class="col">
<label>Region</label>
<input type="text" placeholder="Enter your region">
</div>

<div class="col">
<label>Postal Code</label>
<input type="text" placeholder="Enter postal code">
</div>

</div>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
